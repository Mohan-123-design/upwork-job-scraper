<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upwork Job Scraper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn:hover {
            background: #5a67d8;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .status {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .status.show {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #f0f0f0;
            border-radius: 5px;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: #667eea;
            border-radius: 5px;
            width: 0%;
            transition: width 0.3s;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
        }

        .results.show {
            display: block;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .job-count {
            background: #e8f4f8;
            color: #0066cc;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f8f9fa;
            font-weight: bold;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            border-left: 4px solid #28a745;
        }

        .notification.error {
            border-left: 4px solid #dc3545;
        }

        .notification.info {
            border-left: 4px solid #17a2b8;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .results-header {
                flex-direction: column;
                gap: 10px;
            }

            table {
                font-size: 14px;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Upwork Job Scraper</h1>
            <p>Extract B2B lead generation jobs from Upwork</p>
        </div>

        <!-- Input Section -->
        <div class="card">
            <h2>Search Configuration</h2>
            <div class="input-group">
                <label for="searchUrl">Search URL (Optional)</label>
                <input type="url" id="searchUrl" class="input-field" 
                       placeholder="Leave empty to use default B2B lead generation search">
                <small style="color: #666; font-size: 14px;">Default: B2B lead generation jobs in specified regions</small>
            </div>

            <button id="startBtn" class="btn">▶️ Start Scraping</button>
            <button id="clearBtn" class="btn btn-secondary">🗑️ Clear Results</button>
        </div>

        <!-- Status Section -->
        <div id="status" class="card status">
            <h2>Status</h2>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <p id="statusText">Starting...</p>
            <div class="spinner"></div>
        </div>

        <!-- Results Section -->
        <div id="results" class="card results">
            <div class="results-header">
                <h2>📊 Results</h2>
                <div>
                    <span id="jobCount" class="job-count">0 jobs</span>
                    <button id="downloadBtn" class="btn btn-success">📥 Download CSV</button>
                    <button id="refreshBtn" class="btn btn-secondary">🔄 Refresh</button>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Posted</th>
                            <th>Hourly Rate</th>
                            <th>Location</th>
                            <th>Client Spent</th>
                            <th>Hires</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let isRunning = false;

        document.addEventListener('DOMContentLoaded', function() {
            const startBtn = document.getElementById('startBtn');
            const clearBtn = document.getElementById('clearBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const refreshBtn = document.getElementById('refreshBtn');
            const searchUrl = document.getElementById('searchUrl');
            const status = document.getElementById('status');
            const results = document.getElementById('results');
            const statusText = document.getElementById('statusText');
            const progressFill = document.getElementById('progressFill');
            const jobCount = document.getElementById('jobCount');
            const tableBody = document.getElementById('tableBody');

            // Event listeners
            startBtn.addEventListener('click', startScraping);
            clearBtn.addEventListener('click', clearResults);
            downloadBtn.addEventListener('click', downloadCSV);
            refreshBtn.addEventListener('click', loadResults);

            // Load existing results on page load
            loadResults();

            async function startScraping() {
                if (isRunning) return;

                const url = searchUrl.value.trim();
                isRunning = true;
                startBtn.disabled = true;
                startBtn.textContent = '⏳ Running...';

                status.classList.add('show');
                results.classList.remove('show');

                try {
                    const response = await fetch('/start-scraping', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: url || null })
                    });

                    if (response.ok) {
                        showNotification('Scraping started!', 'success');
                        pollProgress();
                    } else {
                        throw new Error('Failed to start scraping');
                    }
                } catch (error) {
                    showNotification('Error starting scraping: ' + error.message, 'error');
                    resetUI();
                }
            }

            async function pollProgress() {
                const interval = setInterval(async () => {
                    try {
                        const response = await fetch('/progress');
                        const data = await response.json();

                        statusText.textContent = data.message || 'Processing...';
                        progressFill.style.width = data.progress + '%';

                        if (data.completed) {
                            clearInterval(interval);
                            status.classList.remove('show');
                            loadResults();
                            showNotification('Scraping completed!', 'success');
                            resetUI();
                        } else if (data.error) {
                            clearInterval(interval);
                            showNotification('Scraping failed: ' + data.error, 'error');
                            resetUI();
                        }
                    } catch (error) {
                        clearInterval(interval);
                        showNotification('Error checking progress', 'error');
                        resetUI();
                    }
                }, 3000);
            }

            async function loadResults() {
                try {
                    const response = await fetch('/results');
                    const data = await response.json();

                    if (data.jobs && data.jobs.length > 0) {
                        displayResults(data.jobs);
                    }
                } catch (error) {
                    console.error('Error loading results:', error);
                }
            }

            function displayResults(jobs) {
                results.classList.add('show');
                jobCount.textContent = jobs.length + ' jobs';

                tableBody.innerHTML = '';
                jobs.forEach(job => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td title="${job.title || 'N/A'}">${truncate(job.title || 'N/A', 40)}</td>
                        <td>${job.posted || 'N/A'}</td>
                        <td>${job.hourly || 'N/A'}</td>
                        <td>${job.location || 'N/A'}</td>
                        <td>${job.spent || 'N/A'}</td>
                        <td>${job.hires || 'N/A'}</td>
                    `;
                    tableBody.appendChild(row);
                });
            }

            async function downloadCSV() {
                try {
                    const response = await fetch('/download');
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'upwork_jobs_' + new Date().toISOString().split('T')[0] + '.csv';
                    a.click();
                    window.URL.revokeObjectURL(url);
                    showNotification('Download started!', 'success');
                } catch (error) {
                    showNotification('Download failed', 'error');
                }
            }

            async function clearResults() {
                if (confirm('Clear all results?')) {
                    try {
                        await fetch('/clear', { method: 'POST' });
                        results.classList.remove('show');
                        showNotification('Results cleared!', 'info');
                    } catch (error) {
                        showNotification('Error clearing results', 'error');
                    }
                }
            }

            function resetUI() {
                isRunning = false;
                startBtn.disabled = false;
                startBtn.textContent = '▶️ Start Scraping';
                status.classList.remove('show');
            }

            function showNotification(message, type) {
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.textContent = message;
                document.body.appendChild(notification);

                setTimeout(() => notification.classList.add('show'), 100);
                setTimeout(() => {
                    notification.classList.remove('show');
                    setTimeout(() => notification.remove(), 300);
                }, 4000);
            }

            function truncate(str, len) {
                return str.length > len ? str.substring(0, len) + '...' : str;
            }
        });
    </script>
</body>
</html>
